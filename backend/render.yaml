# Render Blueprint (optional). Root Directory in dashboard must be: backend
services:
  - type: web
    name: german-nursing-pathway-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app:create_app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
