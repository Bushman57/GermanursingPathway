# Render Blueprint (optional). Root Directory in dashboard must be: backend
services:
  - type: web
    name: german-nursing-pathway-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Required for cross-origin frontend (www.germanursingpathway.com → this API).
      # Set in Render dashboard; no trailing slashes; include both apex and www.
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORTAL_COOKIE_SECURE
        sync: false
      - key: PORTAL_COOKIE_SAMESITE
        sync: false
      - key: PUBLIC_SITE_URL
        sync: false
      # Set false to disable subscription paywalls and checkout while feature is in development
      - key: SUBSCRIPTIONS_ENABLED
        sync: false
